# =============================================================
# SERENIA ACCOUNTING — docker-compose.yml
# Orchestrates: PostgreSQL, Redis, Django API, Celery, React
# =============================================================

version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: serenia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: serenia_db
      POSTGRES_USER: serenia_user
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serenia_user -d serenia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache & Broker ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: serenia_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API Backend ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: serenia_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://serenia_user:strongpassword@db:5432/serenia_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_initial_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  # ── Celery Worker ───────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: serenia_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://serenia_user:strongpassword@db:5432/serenia_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker -l info -Q default,reports,payroll,notifications

  # ── Celery Beat Scheduler ───────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: serenia_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://serenia_user:strongpassword@db:5432/serenia_db
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - celery
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: serenia_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
  redis_data:
  media_volume:
  static_volume:
